name: Run Flutter Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish, for example v1.0.0.'
        required: true
        type: string
      build_ref:
        description: 'Branch or tag containing the Flutter release workflow.'
        required: true
        default: 'Flutter'
        type: string
      draft:
        description: 'Create the GitHub Release as a draft.'
        required: false
        default: false
        type: boolean
      prerelease:
        description: 'Mark the GitHub Release as a prerelease.'
        required: false
        default: false
        type: boolean

permissions:
  actions: write
  contents: read

jobs:
  dispatch-flutter-release:
    runs-on: ubuntu-latest
    steps:
      - name: Start Flutter branch release workflow
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'release.yml',
              ref: '${{ inputs.build_ref }}',
              inputs: {
                tag: '${{ inputs.tag }}',
                build_ref: '${{ inputs.build_ref }}',
                draft: '${{ inputs.draft }}',
                prerelease: '${{ inputs.prerelease }}'
              }
            })
