name: Flutter CI

on:
  pull_request:
  push:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    - name: Install Linux build dependencies
      run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

    - name: Install dependencies
      run: flutter pub get

    - name: Analyze
      run: flutter analyze

    - name: Run tests
      run: flutter test

  build-desktop:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            artifact: ripme-linux
            path: build/linux/x64/release/bundle
          - os: windows-2022
            target: windows
            artifact: ripme-windows
            path: build/windows/x64/runner/Release
          - os: macos-latest
            target: macos
            artifact: ripme-macos
            path: build/macos/Build/Products/Release/RipMe.app

    steps:
    - uses: actions/checkout@v6

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    - name: Disable Swift Package Manager for macOS
      if: matrix.target == 'macos'
      run: flutter config --no-enable-swift-package-manager

    - name: Install Linux build dependencies
      if: matrix.target == 'linux'
      run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

    - name: Install dependencies
      run: flutter pub get

    - name: Build ${{ matrix.target }}
      run: flutter build ${{ matrix.target }} --release

    - name: Package ${{ matrix.artifact }}
      shell: bash
      run: |
        mkdir -p dist
        if [ "${{ matrix.target }}" = "macos" ]; then
          ditto -c -k --keepParent "${{ matrix.path }}" "dist/${{ matrix.artifact }}.zip"
        elif [ "${{ matrix.target }}" = "windows" ]; then
          (cd "${{ matrix.path }}" && 7z a "$GITHUB_WORKSPACE/dist/${{ matrix.artifact }}.zip" .)
        else
          tar -C "${{ matrix.path }}" -czf "dist/${{ matrix.artifact }}.tar.gz" .
        fi

    - name: Upload ${{ matrix.artifact }}
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.artifact }}
        path: dist/*

  build-android:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Java
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    - name: Install dependencies
      run: flutter pub get

    - name: Build Android APK
      run: flutter build apk --release

    - name: Upload Android APK
      uses: actions/upload-artifact@v7
      with:
        name: ripme-android-apk
        path: build/app/outputs/flutter-apk/app-release.apk
