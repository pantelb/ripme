name: ripme
description: A unified cross-platform application for ripping albums from various websites.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  http: ^1.2.0
  html: ^0.15.4
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  logger: ^2.0.2
  path: ^1.9.0
  intl: ^0.20.2
  permission_handler: ^11.3.0
  url_launcher: ^6.3.2
  provider: ^6.1.5+1
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - src/main/resources/
